name: 오호픽 자동 포스팅

on:
  # ── 스케줄 (한국시간 KST = UTC+9) ──────────────────────────────
  # 활성화하려면 아래 주석 해제
  # schedule:
  #   - cron: "0 23 * * *"   # KST 08:00 (UTC 23:00)
  #   - cron: "0 2  * * *"   # KST 11:00 (UTC 02:00)
  #   - cron: "0 6  * * *"   # KST 15:00 (UTC 06:00)
  #   - cron: "0 11 * * *"   # KST 20:00 (UTC 11:00)

  # ── 수동 실행 ─────────────────────────────────────────────────
  workflow_dispatch:
    inputs:
      keyword:
        description: "키워드 지정 (비우면 트렌드 자동 수집)"
        required: false
        default: ""
      force:
        description: "간격 체크 무시 (true/false)"
        required: false
        default: "false"
      draft:
        description: "드래프트 모드 — 발행 없이 저장 (true/false)"
        required: false
        default: "false"

jobs:
  post:
    name: 오호픽 블로그 글 자동 발행
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      # ── 1. 소스 체크아웃 ──────────────────────────────────────
      - name: 소스 체크아웃
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      # ── 2. Python 환경 세팅 ───────────────────────────────────
      - name: Python 3.11 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 패키지 설치
        run: pip install -r requirements.txt

      # ── 3. 민감 파일 복원 ─────────────────────────────────────
      # env 변수로 먼저 받은 뒤 printf 로 쓰기 — 특수문자·줄바꿈 안전
      - name: credentials.json 복원
        env:
          SECRET_VALUE: ${{ secrets.OHOPICK_CREDENTIALS_JSON }}
        run: printf '%s' "$SECRET_VALUE" > states/ohopick/credentials.json

      - name: token.json 복원
        env:
          SECRET_VALUE: ${{ secrets.OHOPICK_TOKEN_JSON }}
        run: printf '%s' "$SECRET_VALUE" > states/ohopick/token.json

      - name: 상태 파일 초기화 (없을 경우)
        run: |
          [ ! -f states/ohopick/published_log.json ] && echo '{"entries":[]}' > states/ohopick/published_log.json || true
          [ ! -f states/ohopick/used_images.json ]   && echo '[]'             > states/ohopick/used_images.json   || true

      # ── 4. 오케스트레이터 실행 ────────────────────────────────
      - name: 오케스트레이터 실행
        env:
          BLOG_TARGET:           ohopick
          GEMINI_API_KEY:        ${{ secrets.GEMINI_API_KEY }}
          BLOG_ID:               ${{ secrets.OHOPICK_BLOG_ID }}
          NAVER_CLIENT_ID:       ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET:   ${{ secrets.NAVER_CLIENT_SECRET }}
          UNSPLASH_ACCESS_KEY:   ${{ secrets.UNSPLASH_ACCESS_KEY }}
          PIXABAY_API_KEY:       ${{ secrets.PIXABAY_API_KEY }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY:    ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
          GEMINI_TEXT_MODEL:     "gemini-2.5-flash"
          PYTHONIOENCODING:      "utf-8"
          PYTHONPATH:            ".:core"
        run: |
          KEYWORD="${{ github.event.inputs.keyword }}"
          DRAFT="${{ github.event.inputs.draft }}"

          CMD="python core/orchestrator.py --force"

          if [ -n "$KEYWORD" ]; then
            CMD="$CMD --keyword \"$KEYWORD\""
          fi

          if [ "$DRAFT" = "true" ]; then
            CMD="$CMD --draft"
          fi

          echo "실행 명령어: $CMD"
          eval $CMD

      # ── 5. 상태 파일 커밋 ─────────────────────────────────────
      - name: 상태 파일 커밋
        run: |
          git config user.name  "ohopick-bot"
          git config user.email "bot@ohopick.com"
          git add states/ohopick/published_log.json states/ohopick/used_images.json
          [ -f states/ohopick/rotation_state.json ] && git add states/ohopick/rotation_state.json || true
          if [ "${{ github.event.inputs.draft }}" = "true" ] && [ -f states/ohopick/draft_preview.json ]; then
            git add states/ohopick/draft_preview.json
          fi
          if ! git diff --staged --quiet; then
            git commit -m "chore: 오호픽 자동 발행 상태 업데이트 [skip ci]"
            git pull --rebase origin master
            git push origin HEAD:master
          fi
